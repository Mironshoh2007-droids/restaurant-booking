<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Ресторан «Уют»</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            padding: 2rem;
        }
        .container {
            max-width: 1400px;
            margin: auto;
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        h1, h2, h3 {
            color: #2c3e50;
            margin-bottom: 1rem;
        }
        .nav {
            margin-bottom: 2rem;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 0.5rem;
        }
        .nav a {
            margin-right: 1rem;
            text-decoration: none;
            color: #27ae60;
        }
        .login-form {
            max-width: 300px;
            margin: 2rem auto;
            text-align: center;
        }
        .login-form input {
            width: 100%;
            margin: 0.5rem 0;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 0.5rem;
        }
        .login-form button {
            background: #27ae60;
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 2rem;
            width: 100%;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background: #f2f2f2;
        }
        .btn-confirm {
            background: #27ae60;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-danger {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }
        .message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 1rem;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }
        .flex-row {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .add-table-form input {
            padding: 0.5rem;
            margin-right: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 0.5rem;
        }
        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .table-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: white;
            padding: 1rem;
            border-radius: 12px;
            border: 2px solid #ddd;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .table-card.free {
            background-color: #d4edda;
            border-color: #28a745;
            color: #155724;
        }
        .table-card.busy {
            background-color: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(220,53,69,0.4); }
            70% { box-shadow: 0 0 0 8px rgba(220,53,69,0); }
            100% { box-shadow: 0 0 0 0 rgba(220,53,69,0); }
        }
        .table-shape {
            width: 80px;
            height: 80px;
            margin-bottom: 0.5rem;
        }
        .shape-round {
            border-radius: 50%;
            background-color: currentColor;
            opacity: 0.7;
        }
        .shape-square {
            border-radius: 12px;
            background-color: currentColor;
            opacity: 0.7;
        }
        .shape-rectangle {
            border-radius: 8px;
            width: 100px;
            height: 60px;
            background-color: currentColor;
            opacity: 0.7;
        }
        .table-number {
            font-weight: 700;
            font-size: 1.2rem;
        }
        .table-seats {
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }
        .table-location {
            font-size: 0.7rem;
            margin-top: 0.2rem;
        }
        .status-text {
            font-size: 0.7rem;
            margin-top: 0.3rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
<div class="container" id="admin-container">
    <div class="nav">
        <h1>🍽️ Ресторан «Уют» — Администратор</h1>
        <a href="/" target="_blank">Вернуться на сайт</a>
    </div>

    <div id="login-section">
        <div class="login-form">
            <h2>Вход в админ-панель</h2>
            <input type="text" id="username" placeholder="Логин (admin)" value="admin">
            <input type="password" id="password" placeholder="Пароль (admin123)" value="admin123">
            <button onclick="login()">Войти</button>
            <div id="login-message"></div>
        </div>
    </div>

    <div id="admin-content" style="display: none;">
        <div class="flex-row">
            <h2>📋 Все бронирования</h2>
            <button onclick="logout()" style="background: #e74c3c; color: white; border: none; padding: 0.5rem 1rem; border-radius: 2rem; cursor: pointer;">Выйти</button>
        </div>

        <div class="flex-row">
            <label>Дата для проверки занятости:</label>
            <input type="date" id="admin-date" value="2026-03-25">
            <label>Время:</label>
            <input type="time" id="admin-time" value="19:00">
            <button onclick="loadTablesWithStatus()">Обновить</button>
        </div>

        <h3>🪑 Столики (зелёные – свободные, красные – занятые, мигают)</h3>
        <div id="tables-status-container" class="tables-grid">Загрузка...</div>

        <h2>🪑 Управление столиками</h2>
        <div class="add-table-form">
            <input type="text" id="table-number" placeholder="Номер столика">
            <input type="number" id="table-seats" placeholder="Кол-во мест">
            <input type="text" id="table-location" placeholder="Расположение">
            <button onclick="addTable()">Добавить столик</button>
        </div>
        <div id="tables-list">Загрузка...</div>

        <h2>📋 Список бронирований</h2>
        <div id="bookings-list">Загрузка...</div>
    </div>
</div>

<script>
    const API_BASE = window.location.origin;

    function getShapeClass(number) {
        const shapes = ['shape-round', 'shape-square', 'shape-rectangle'];
        const index = (parseInt(number.replace(/\D/g,'')) || 1) % 3;
        return shapes[index];
    }

    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const res = await fetch(`${API_BASE}/api/admin/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
            credentials: 'include'
        });
        const data = await res.json();
        if (res.ok) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            loadBookings();
            loadTables();
            loadTablesWithStatus();
        } else {
            document.getElementById('login-message').innerHTML = `<div class="message error">Ошибка входа</div>`;
        }
    }

    async function logout() {
        await fetch(`${API_BASE}/api/admin/logout`, { method: 'POST', credentials: 'include' });
        document.getElementById('login-section').style.display = 'block';
        document.getElementById('admin-content').style.display = 'none';
    }

    async function loadBookings() {
        const res = await fetch(`${API_BASE}/api/admin/bookings`, { credentials: 'include' });
        if (!res.ok) return;
        const bookings = await res.json();
        let html = '<table><thead> <tr><th>ID</th><th>Столик</th><th>Имя</th><th>Телефон</th><th>Дата</th><th>Время</th><th>Статус</th><th>Код</th><th>Действие</th></tr> </thead><tbody>';
        for (let b of bookings) {
            html += `<tr>
                        <td>${b.id}</td>
                        <td>${b.table_id}</td>
                        <td>${b.customer_name}</td>
                        <td>${b.phone || ''}</td>
                        <td>${b.date}</td>
                        <td>${b.time}</td>
                        <td>${b.status}</td>
                        <td>${b.code}</td>
                        <td>${b.status === 'pending' ? `<button class="btn-confirm" onclick="confirmBooking(${b.id})">Подтвердить</button>` : ''}</td>
                     </tr>`;
        }
        html += '</tbody> </table>';
        document.getElementById('bookings-list').innerHTML = html;
    }

    async function confirmBooking(id) {
        const res = await fetch(`${API_BASE}/api/admin/confirm/${id}`, { method: 'POST', credentials: 'include' });
        if (res.ok) {
            loadBookings();
            loadTablesWithStatus();
        }
    }

    async function loadTables() {
        const res = await fetch(`${API_BASE}/api/admin/tables`, { credentials: 'include' });
        if (!res.ok) return;
        const tables = await res.json();
        let html = ' <table><thead> <tr><th>ID</th><th>Номер</th><th>Мест</th><th>Расположение</th><th>Действие</th></tr> </thead><tbody>';
        for (let t of tables) {
            html += `<tr>
                        <td>${t.id}</td>
                        <td>${t.number}</td>
                        <td>${t.seats}</td>
                        <td>${t.location}</td>
                        <td><button class="btn-danger" onclick="deleteTable(${t.id})">Удалить</button></td>
                     </tr>`;
        }
        html += '</tbody> </table>';
        document.getElementById('tables-list').innerHTML = html;
    }

    async function loadTablesWithStatus() {
        const date = document.getElementById('admin-date').value;
        const time = document.getElementById('admin-time').value;
        const [allTables, freeTables] = await Promise.all([
            fetch(`${API_BASE}/api/admin/tables`, { credentials: 'include' }).then(r => r.json()),
            fetch(`${API_BASE}/api/tables?date=${date}&time=${time}`).then(r => r.json())
        ]);
        const freeIds = new Set(freeTables.map(t => t.id));
        const container = document.getElementById('tables-status-container');
        let html = '';
        for (let t of allTables) {
            const isFree = freeIds.has(t.id);
            const statusClass = isFree ? 'free' : 'busy';
            const shapeClass = getShapeClass(t.number);
            const statusText = isFree ? '🟢 Свободен' : '🔴 Занят';
            html += `
                <div class="table-card ${statusClass}">
                    <div class="table-shape ${shapeClass}" style="background-color: ${isFree ? '#28a745' : '#dc3545'};"></div>
                    <div class="table-number">Стол ${t.number}</div>
                    <div class="table-seats">🍴 ${t.seats} места</div>
                    <div class="table-location">${t.location}</div>
                    <div class="status-text">${statusText}</div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    async function addTable() {
        const number = document.getElementById('table-number').value;
        const seats = parseInt(document.getElementById('table-seats').value);
        const location = document.getElementById('table-location').value;
        if (!number || !seats) return alert('Заполните номер и кол-во мест');
        const res = await fetch(`${API_BASE}/api/admin/tables`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ number, seats, location }),
            credentials: 'include'
        });
        if (res.ok) {
            loadTables();
            loadTablesWithStatus();
            document.getElementById('table-number').value = '';
            document.getElementById('table-seats').value = '';
            document.getElementById('table-location').value = '';
        }
    }

    async function deleteTable(id) {
        if (!confirm('Удалить столик?')) return;
        await fetch(`${API_BASE}/api/admin/tables/${id}`, { method: 'DELETE', credentials: 'include' });
        loadTables();
        loadTablesWithStatus();
    }
</script>
</body>
</html>
